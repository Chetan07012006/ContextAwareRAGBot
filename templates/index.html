<!DOCTYPE html>
<html>
<head>
    <title>Context-Aware Customer Support RAG Bot</title>
    <style>
        body{
            font-family:Arial,sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:500px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }
        input,textarea{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:15px;
        }
        button{
            padding:10px 20px;
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }
        .answer{
            margin-top:20px;
            background:#eef;
            padding:15px;
            border-radius:5px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Context-Aware Customer Support RAG Bot</h2>

<form method="POST">

<label>User ID</label>
<input type="text" name="user_id" required>

<label>Question</label>
<textarea name="question" rows="4" required></textarea>

<button type="submit">Ask</button>

</form>

{% if answer %}
<div class="answer">
<b>Answer:</b><br><br>
{{ answer }}
</div>
{% endif %}

</div>

</body>
</html>
